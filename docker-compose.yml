version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: bacst
    ports:
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .
    container_name: nextjs-app
    ports:
      - '3000:3000'
    depends_on:
      - mysql
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      MYSQL_DATABASE: my_app_db
    volumes:
      - .:/app
    stdin_open: true
    tty: true

volumes:
  mysql-data:

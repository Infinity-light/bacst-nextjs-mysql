name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/apps

            # Configure Docker mirror for China servers
            sudo mkdir -p /etc/docker
            cat << 'DAEMON_EOF' | sudo tee /etc/docker/daemon.json > /dev/null
            {
              "registry-mirrors": [
                "https://docker.1ms.run",
                "https://docker.mybacc.com",
                "https://docker.xuanyuan.me"
              ]
            }
            DAEMON_EOF
            sudo systemctl restart docker || true
            sleep 3

            # Clone or update the repository using GitHub token
            REPO_URL="https://Infinity-light:${{ secrets.GH_TOKEN }}@github.com/Infinity-light/bacst-nextjs-mysql.git"

            if [ -d "bacst-nextjs-mysql/.git" ]; then
              cd bacst-nextjs-mysql
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf bacst-nextjs-mysql
              git clone --depth 1 $REPO_URL
              cd bacst-nextjs-mysql
            fi

            # Create .env file with secrets
            cat > .env << ENVEOF
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_PORT=${{ secrets.MYSQL_PORT }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            EMAIL_TO=${{ secrets.EMAIL_TO }}
            TENCENT_COS_SECRET_ID=${{ secrets.TENCENT_COS_SECRET_ID }}
            TENCENT_COS_SECRET_KEY=${{ secrets.TENCENT_COS_SECRET_KEY }}
            TENCENT_COS_BUCKET=${{ secrets.TENCENT_COS_BUCKET }}
            TENCENT_COS_REGION=${{ secrets.TENCENT_COS_REGION }}
            ENVEOF
            sed -i 's/^ *//' .env

            # Build and start containers
            docker compose build --no-cache
            docker compose up -d

            # Wait for container to start
            sleep 15

            # Health check
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker logs bacst-nextjs-mysql --tail 30
            exit 1